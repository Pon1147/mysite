<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghép Nối Tình Yêu | Happy 19th Birthday ❤️</title>
    
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap">
    
    <!-- Compiled CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Password Screen -->
        <div id="password-screen" class="screen active">
            <div class="lock-box">
                <div class="heart-icon">💖</div>
                <h1>Chỉ dành cho em</h1>
                <h2>Nhập mật khẩu để mở món quà sinh nhật</h2>
                
                <input type="password" id="password-input" 
                       placeholder="ddmm (ngày quen nhau)" autocomplete="off">
                
                <button onclick="checkPassword()">Mở ra ❤️</button>
                
                <p class="hint">Gợi ý: Ngày chúng mình quen nhau (ví dụ: 1506)</p>
            </div>
        </div>

        <!-- Main Game Screen -->
        <div id="main-screen" class="screen">
            <header>
                <h1>Ghép Nối Tình Yêu</h1>
                <p class="subtitle">Sinh nhật lần thứ 19 của em — 30/04/2027</p>
                
                <div class="music-control">
                    <button id="music-btn">♪ Nhạc nền</button>
                </div>
            </header>

            <div class="levels-grid">
                <!-- Level cards sẽ được JS thêm vào sau -->
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/puzzle.js"></script>
    <script src="js/confetti.js"></script>
</body>
</html>
